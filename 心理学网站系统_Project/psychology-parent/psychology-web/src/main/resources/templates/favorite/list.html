<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"><title>收藏管理</title>
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" media="all">
  <style>.layui-table-cell .layui-form-checkbox[lay-skin="primary"] { top: 50%; transform: translateY(-50%); }</style>
</head>
<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-form layui-card-header layuiadmin-card-header-auto">
      <div class="layui-form-item">
        <div class="layui-inline"><label class="layui-form-label">目标类型：</label><div class="layui-input-inline">
          <select id="search_type"><option value="">全部</option><option value="ARTICLE">文章</option><option value="BOOK">书籍</option></select>
        </div></div>
        <div class="layui-inline"><button id="search-submit" class="layui-btn layuiadmin-btn-list"><i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询</button></div>
      </div>
    </div>
    <div class="layui-card-body layui-form">
      <table id="LAY-app-content-list" lay-filter="LAY-app-content-list"></table>
      <script type="text/html" id="toolbarDemo"><div class="layui-btn-container"><button class="layui-btn layuiadmin-btn-list layui-btn-danger" lay-event="batchdel">批量删除</button></div></script>
      <script type="text/html" id="table-content-list"><a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a></script>
    </div>
  </div>
</div>
<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script th:inline="none">
layui.use(['table', 'layer', 'form'], function(){
    var table = layui.table, layer = layui.layer, $ = layui.$;
    table.render({
        elem: '#LAY-app-content-list', url: '/favorite/getPage', method: 'post', page: true,
        limits: [5, 10, 20, 50], limit: 10, layout: ['count','prev','page','next','limit','refresh','skip'],
        request: { pageName: 'page', limitName: 'limit' }, toolbar: '#toolbarDemo', cellMinWidth: 80,
        defaultToolbar: ['filter', 'exports', 'print'],
        cols: [[
            {type: 'checkbox'},
            {field: 'id', title: 'ID', width: 80, sort: true},
            {field: 'nickname', title: '收藏用户', width: 120},
            {field: 'targetType', title: '目标类型', width: 100, templet: function(d){ return d.targetType === 'ARTICLE' ? '文章' : d.targetType === 'BOOK' ? '书籍' : d.targetType; }},
            {field: 'targetId', title: '目标ID', width: 100},
            {field: 'createTime', title: '收藏时间', width: 170, templet: function(d){ return d.createTime ? d.createTime.substring(0, 16).replace('T', ' ') : ''; }},
            {fixed: 'right', title: '操作', toolbar: '#table-content-list', width: 100}
        ]]
    });
    table.on('toolbar(LAY-app-content-list)', function(obj){
        if(obj.event == 'batchdel'){
            var checkStatus = table.checkStatus('LAY-app-content-list'), delList = [];
            checkStatus.data.forEach(function(n){ delList.push(n.id); });
            layer.confirm('确认要删除被选中的记录吗？', {btn: ['确定','取消']}, function(index){
                $.ajax({ type: 'post', url: '/favorite/batchDel', data: {ids: delList},
                    success: function(data){
                        if(data.code == '0'){ table.reload('LAY-app-content-list'); layer.msg('批量删除成功', {time: 1000}); }
                        else { layer.msg('批量删除失败', {time: 1000}); }
                    }
                });
            });
        }
    });
    table.on('tool(LAY-app-content-list)', function(obj){
        if(obj.event == 'del'){
            layer.confirm('确认要删除吗？', {btn: ['确定','取消']}, function(index){
                $.ajax({ type: 'post', url: '/favorite/doDel/' + obj.data.id,
                    success: function(data){
                        if(data.code == '0'){ table.reload('LAY-app-content-list'); layer.msg('删除成功', {time: 1000}); }
                        else { layer.msg('删除失败', {time: 1000}); }
                    }
                });
            });
        }
    });
    $('#search-submit').on('click', function(){
        table.reload('LAY-app-content-list', { where: { targetType: $('#search_type').val() }, page: { curr: 1 } });
    });
});
</script>
</body>
</html>
