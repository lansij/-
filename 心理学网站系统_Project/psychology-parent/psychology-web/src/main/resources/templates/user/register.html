<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>注册 - 心理学网站</title>
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-box { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); width: 400px; }
        .register-box h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .register-btn { width: 100%; }
        .login-link { text-align: center; margin-top: 15px; }
        .login-link a { color: #1E9FFF; }
    </style>
</head>
<body>
<div class="register-box">
    <h2>心理学网站 - 用户注册</h2>
    <form class="layui-form" id="registerForm">
        <div class="layui-form-item">
            <input type="text" name="username" required lay-verify="required" placeholder="用户名" autocomplete="off" class="layui-input">
        </div>
        <div class="layui-form-item">
            <input type="password" name="password" required lay-verify="required" placeholder="密码" autocomplete="off" class="layui-input">
        </div>
        <div class="layui-form-item">
            <input type="text" name="nickname" placeholder="昵称" autocomplete="off" class="layui-input">
        </div>
        <div class="layui-form-item">
            <input type="text" name="phone" placeholder="手机号" autocomplete="off" class="layui-input">
        </div>
        <div class="layui-form-item">
            <button type="button" class="layui-btn layui-btn-normal register-btn" lay-submit lay-filter="register">注 册</button>
        </div>
        <div class="login-link">
            已有账号？<a href="/user/toLogin">立即登录</a>
        </div>
    </form>
</div>
<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script th:inline="none">
    layui.use(['form', 'layer'], function(){
        var form = layui.form;
        var layer = layui.layer;
        var $ = layui.$;

        form.on('submit(register)', function(data){
            $.ajax({
                url: '/user/doRegister',
                type: 'POST',
                data: data.field,
                success: function(res){
                    if(res.code == 0){
                        layer.msg('注册成功', {icon: 1});
                        setTimeout(function(){
                            window.location.href = '/user/toLogin';
                        }, 1000);
                    } else {
                        layer.msg(res.msg || '注册失败', {icon: 2});
                    }
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
