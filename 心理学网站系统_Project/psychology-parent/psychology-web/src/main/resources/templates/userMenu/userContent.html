<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>心理学网站</title>
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: "Microsoft YaHei", sans-serif; color: #333; }

        /* 头部 */
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 18px 0; box-shadow: 0 2px 12px rgba(102,126,234,0.3); }
        .header .inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
        .header .user-info { display: flex; align-items: center; gap: 18px; }
        .header .user-info span { font-size: 14px; opacity: 0.9; }
        .header .user-info a { color: #fff; font-size: 14px; text-decoration: none; padding: 4px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px; transition: all 0.2s; }
        .header .user-info a:hover { background: rgba(255,255,255,0.2); border-color: #fff; }

        /* 导航栏 */
        .nav-bar { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .nav-bar .inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 48px; gap: 0; }
        .nav-bar .nav-item { padding: 0 28px; height: 48px; line-height: 48px; font-size: 15px; color: #555; text-decoration: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
        .nav-bar .nav-item:hover { color: #667eea; }
        .nav-bar .nav-item.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }

        /* 主体 */
        .main { max-width: 1200px; margin: 24px auto; padding: 0 24px; }

        /* 模块卡片 */
        .section { background: #fff; border-radius: 10px; padding: 24px 28px; margin-bottom: 24px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); overflow: hidden; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; color: #333; font-weight: 600; padding-left: 14px; border-left: 4px solid #667eea; line-height: 1; }
        .section-more { font-size: 13px; color: #999; text-decoration: none; cursor: pointer; }
        .section-more:hover { color: #667eea; }

        /* 5列卡片网格 */
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; width: 100%; }
        .card { border: 1px solid #f0f0f0; border-radius: 8px; overflow: hidden; transition: all 0.3s; cursor: pointer; background: #fff; min-width: 0; }
        .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); transform: translateY(-3px); }
        .card:active { transform: scale(0.98); }
        .card .cover { width: 100%; height: 180px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 13px; overflow: hidden; }
        .card .cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .card:hover .cover img { transform: scale(1.05); }
        .card .info { padding: 12px 14px; }
        .card .info h4 { font-size: 14px; color: #333; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
        .card .info p { font-size: 12px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 新闻列表 */
        .news-list .item { padding: 14px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
        .news-list .item:last-child { border-bottom: none; }
        .news-list .item:hover { background: #fafafa; margin: 0 -10px; padding-left: 10px; padding-right: 10px; border-radius: 4px; }
        .news-list .item .title { font-size: 14px; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .news-list .item .title:hover { color: #667eea; cursor: pointer; }
        .news-list .item .date { font-size: 12px; color: #bbb; margin-left: 20px; flex-shrink: 0; }

        /* 公告列表 */
        .announcement-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; width: 100%; }
        .announcement-card { padding: 16px; background: #fafafa; border-radius: 8px; border-left: 3px solid #667eea; transition: all 0.2s; cursor: pointer; min-height: 100px; display: flex; flex-direction: column; justify-content: center; min-width: 0; overflow: hidden; }
        .announcement-card:hover { background: #f0f2ff; box-shadow: 0 2px 8px rgba(102,126,234,0.12); }
        .announcement-card h4 { font-size: 14px; color: #333; margin-bottom: 8px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .announcement-card p { font-size: 12px; color: #888; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; word-break: break-all; }

        /* 页脚 */
        .footer { text-align: center; padding: 24px; color: #bbb; font-size: 13px; margin-top: 10px; }

        /* 响应式 */
        @media (max-width: 992px) {
            .card-grid, .announcement-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .card-grid, .announcement-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- 头部 -->
<div class="header">
    <div class="inner">
        <h1>🌿 心理学网站</h1>
        <div class="user-info">
            <!-- 未登录：显示登录和注册按钮 -->
            <th:block th:if="${session.user == null}">
                <a href="/user/toLogin">登录</a>
                <a href="/user/toRegister">注册</a>
            </th:block>
            <!-- 已登录：显示用户信息和退出按钮 -->
            <th:block th:if="${session.user != null}">
                <span>欢迎，[[${session.user?.nickname}]]</span>
                <a href="javascript:;" id="backAdminBtn" th:attr="data-role=${session.user?.role}">返回后台</a>
                <a href="/user/toCenter">个人中心</a>
                <a href="/user/logout">退出登录</a>
            </th:block>
        </div>
    </div>
</div>

<!-- 导航栏 -->
<div class="nav-bar">
    <div class="inner">
        <a class="nav-item active" href="javascript:scrollToSection('news')">📰 新闻速递</a>
        <a class="nav-item" href="javascript:scrollToSection('article')">📖 心理文章</a>
        <a class="nav-item" href="javascript:scrollToSection('book')">📚 心理书籍</a>
        <a class="nav-item" href="javascript:scrollToSection('image')">🖼️ 心理图片</a>
        <a class="nav-item" href="javascript:scrollToSection('announcement')">📢 活动公告</a>
    </div>
</div>

<!-- 主体内容 -->
<div class="main">

    <!-- 新闻速递 -->
    <div class="section" id="sec-news">
        <div class="section-header">
            <h3 class="section-title">新闻速递</h3>
        </div>
        <div class="news-list" id="newsList"></div>
    </div>

    <!-- 心理文章 -->
    <div class="section" id="sec-article">
        <div class="section-header">
            <h3 class="section-title">心理文章</h3>
        </div>
        <div class="card-grid" id="articleList"></div>
    </div>

    <!-- 心理书籍 -->
    <div class="section" id="sec-book">
        <div class="section-header">
            <h3 class="section-title">心理书籍</h3>
        </div>
        <div class="card-grid" id="bookList"></div>
    </div>

    <!-- 心理图片 -->
    <div class="section" id="sec-image">
        <div class="section-header">
            <h3 class="section-title">心理图片</h3>
        </div>
        <div class="card-grid" id="imageList"></div>
    </div>

    <!-- 活动公告 -->
    <div class="section" id="sec-announcement">
        <div class="section-header">
            <h3 class="section-title">活动公告</h3>
        </div>
        <div class="announcement-grid" id="announcementList"></div>
    </div>

</div>

<div class="footer">
    © 2026 心理学网站 — 关注心理健康，拥抱美好生活
</div>

<script th:inline="none" th:src="@{/layuiadmin/layui/layui.js}"></script>
<script th:inline="none">
function scrollToSection(name) {
    document.getElementById('sec-' + name).scrollIntoView({ behavior: 'smooth' });
    var items = document.querySelectorAll('.nav-item');
    items.forEach(function(item){ item.classList.remove('active'); });
    event.target.classList.add('active');
}

layui.use(['layer'], function() {
    var $ = layui.$;

    // 返回后台按钮
    $('#backAdminBtn').on('click', function() {
        var role = document.getElementById('backAdminBtn').getAttribute('data-role');
        if (role === 'ADMIN') {
            location.href = '/toIndex';
        } else {
            layui.layer.msg('没有权限', {icon: 2});
        }
    });

    // 加载新闻
    $.post('/news/getPage', { page: 1, limit: 20 }, function(res) {
        var html = '';
        if (res.data) {
            res.data.forEach(function(item) {
                html += '<div class="item"><span class="title">' + item.title + '</span><span class="date">' + (item.createTime ? item.createTime.substring(0, 10) : '') + '</span></div>';
            });
        }
        $('#newsList').html(html || '<p style="color:#999;text-align:center;padding:20px;">暂无新闻</p>');
    });

    // 加载文章
    $.post('/article/getPage', { page: 1, limit: 20 }, function(res) {
        var html = '';
        if (res.data) {
            res.data.forEach(function(item) {
                html += '<div class="card" data-id="' + item.id + '" data-type="article"><div class="cover">' + (item.cover ? '<img src="' + item.cover + '">' : '暂无封面') + '</div><div class="info"><h4>' + item.title + '</h4><p>' + (item.summary || '') + '</p></div></div>';
            });
        }
        $('#articleList').html(html || '<p style="color:#999;text-align:center;padding:20px;grid-column:1/-1;">暂无文章</p>');
    });

    // 加载书籍
    $.post('/book/getPage', { page: 1, limit: 20 }, function(res) {
        var html = '';
        if (res.data) {
            res.data.forEach(function(item) {
                html += '<div class="card" data-id="' + item.id + '" data-type="book"><div class="cover">' + (item.cover ? '<img src="' + item.cover + '">' : '暂无封面') + '</div><div class="info"><h4>' + item.title + '</h4><p>' + (item.bookAuthor || '') + '</p></div></div>';
            });
        }
        $('#bookList').html(html || '<p style="color:#999;text-align:center;padding:20px;grid-column:1/-1;">暂无书籍</p>');
    });

    // 加载图片
    $.post('/image/getPage', { page: 1, limit: 20 }, function(res) {
        var html = '';
        if (res.data) {
            res.data.forEach(function(item) {
                html += '<div class="card" data-id="' + item.id + '" data-type="image"><div class="cover">' + (item.cover ? '<img src="' + item.cover + '">' : '暂无图片') + '</div><div class="info"><h4>' + item.title + '</h4><p>' + (item.summary || '') + '</p></div></div>';
            });
        }
        $('#imageList').html(html || '<p style="color:#999;text-align:center;padding:20px;grid-column:1/-1;">暂无图片</p>');
    });

    // 加载公告
    $.post('/announcement/getPage', { page: 1, limit: 20 }, function(res) {
        var html = '';
        if (res.data) {
            res.data.forEach(function(item) {
                html += '<div class="announcement-card" data-id="' + item.id + '"><h4>' + item.title + '</h4><p>' + (item.summary || '') + '</p></div>';
            });
        }
        $('#announcementList').html(html || '<p style="color:#999;text-align:center;padding:20px;grid-column:1/-1;">暂无公告</p>');
    });

    // 卡片点击事件
    $(document).on('click', '.card[data-id]', function() {
        var id = $(this).data('id');
        var type = $(this).data('type');
        location.href = '/' + type + '/toDetail/' + id;
    });

    // 公告卡片点击事件
    $(document).on('click', '.announcement-card[data-id]', function() {
        var id = $(this).data('id');
        location.href = '/announcement/toDetail/' + id;
    });
});
</script>
</body>
</html>
