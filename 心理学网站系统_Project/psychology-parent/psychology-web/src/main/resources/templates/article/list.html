<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>文章管理</title>
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" media="all">
  <style>
    .layui-table-cell .layui-form-checkbox[lay-skin="primary"] { top: 50%; transform: translateY(-50%); }
  </style>
</head>
<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-form layui-card-header layuiadmin-card-header-auto">
      <div class="layui-form-item">
        <div class="layui-inline">
          <label class="layui-form-label">文章标题：</label>
          <div class="layui-input-inline">
            <input type="text" id="search_keyword" placeholder="请输入文章标题" autocomplete="off" class="layui-input"/>
          </div>
        </div>
        <div class="layui-inline">
          <button id="search-submit" class="layui-btn layuiadmin-btn-list">
            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
          </button>
        </div>
      </div>
    </div>
    <div class="layui-card-body layui-form">
      <table id="LAY-app-content-list" lay-filter="LAY-app-content-list"></table>
      <script type="text/html" id="toolbarDemo">
        <div class="layui-btn-container">
          <button class="layui-btn layuiadmin-btn-list layui-btn-danger" lay-event="batchdel">批量删除</button>
          <button class="layui-btn layuiadmin-btn-list" lay-event="add">添加</button>
        </div>
      </script>
      <script type="text/html" id="table-content-list">
        <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i>编辑</a>
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a>
      </script>
    </div>
  </div>
</div>
<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script th:inline="none">
layui.use(['table', 'layer', 'form'], function(){
    var table = layui.table, layer = layui.layer, $ = layui.$;

    table.render({
        elem: '#LAY-app-content-list',
        url: '/article/getPage',
        method: 'post',
        page: true,
        limits: [5, 10, 20, 50],
        limit: 10,
        layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip'],
        request: { pageName: 'page', limitName: 'limit' },
        toolbar: '#toolbarDemo',
        cellMinWidth: 80,
        defaultToolbar: ['filter', 'exports', 'print'],
        cols: [[
            {type: 'checkbox'},
            {field: 'id', title: 'ID', width: 80, sort: true},
            {field: 'title', title: '标题', width: 200},
            {field: 'author', title: '作者', width: 120},
            {title: '封面图', width: 120, templet: function(d){ return d.cover ? '<img src="' + d.cover + '" style="height:40px;"/>' : '暂无'; }},
            {field: 'viewCount', title: '浏览量', width: 100},
            {field: 'status', title: '状态', width: 100, templet: function(d){ return d.status == 1 ? '已发布' : '草稿'; }},
            {field: 'createTime', title: '创建时间', width: 170, templet: function(d){ return d.createTime ? d.createTime.substring(0, 16).replace('T', ' ') : ''; }},
            {fixed: 'right', title: '操作', toolbar: '#table-content-list', width: 150}
        ]]
    });

    table.on('toolbar(LAY-app-content-list)', function(obj){
        if(obj.event == 'batchdel'){
            var checkStatus = table.checkStatus('LAY-app-content-list'), delList = [];
            checkStatus.data.forEach(function(n){ delList.push(n.id); });
            layer.confirm('确认要删除被选中的记录吗？', {btn: ['确定','取消']}, function(index){
                $.ajax({ type: 'post', url: '/article/batchDel', data: {ids: delList},
                    success: function(data){
                        if(data.code == '0'){ table.reload('LAY-app-content-list'); layer.msg('批量删除成功', {time: 1000}); }
                        else { layer.msg('批量删除失败', {time: 1000}); }
                    }
                });
            });
        } else if(obj.event == 'add'){
            layer.open({
                type: 2, title: '添加文章', area: ['600px', '550px'], shade: 0.8,
                content: '/article/toAdd',
                end: function(){ table.reload('LAY-app-content-list'); }
            });
        }
    });

    table.on('tool(LAY-app-content-list)', function(obj){
        if(obj.event == 'edit'){
            layer.open({
                type: 2, title: '修改文章', area: ['600px', '550px'], shade: 0.8,
                content: '/article/toEdit/' + obj.data.id,
                end: function(){ table.reload('LAY-app-content-list'); }
            });
        } else if(obj.event == 'del'){
            layer.confirm('确认要删除吗？', {btn: ['确定','取消']}, function(index){
                $.ajax({ type: 'post', url: '/article/doDel/' + obj.data.id,
                    success: function(data){
                        if(data.code == '0'){ table.reload('LAY-app-content-list'); layer.msg('删除成功', {time: 1000}); }
                        else { layer.msg('删除失败', {time: 1000}); }
                    }
                });
            });
        }
    });

    $('#search-submit').on('click', function(){
        table.reload('LAY-app-content-list', { where: { keyword: $('#search_keyword').val() }, page: { curr: 1 } });
    });
});
</script>
</body>
</html>
